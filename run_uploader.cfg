# Конфигурация для run_uploader.bat
# Формат: KEY=VALUE
# Пустые значения можно оставить, тогда BAT спросит их интерактивно.

REPO_URL=
REPO_PATH=
FILE_PATH=
NEXUS_USER=
NEXUS_PASS=

# 1 = при DELETE 403/404 продолжать UPLOAD
# 0 = при DELETE 403/404 останавливать выполнение
CONTINUE_ON_DELETE_403_404=1

# 1 = curl игнорирует SSL-сертификат (-k)
# 0 = стандартная TLS-проверка сертификата
CURL_INSECURE=1
