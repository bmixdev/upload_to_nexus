# Конфиг запуска GitLab pipeline
# Формат: KEY=VALUE

GITLAB_URL=https://gitlab.example.com
PROJECT_ID=
REF=main

# AUTH_MODE: TRIGGER или PRIVATE
AUTH_MODE=TRIGGER

# Для AUTH_MODE=TRIGGER
TRIGGER_TOKEN=

# Для AUTH_MODE=PRIVATE
PRIVATE_TOKEN=

# 1 = curl игнорирует SSL сертификат (-k)
# 0 = стандартная TLS-проверка
INSECURE_SSL=1

# До 10 переменных pipeline
VAR1_KEY=
VAR1_VALUE=
VAR2_KEY=
VAR2_VALUE=
VAR3_KEY=
VAR3_VALUE=
VAR4_KEY=
VAR4_VALUE=
VAR5_KEY=
VAR5_VALUE=
VAR6_KEY=
VAR6_VALUE=
VAR7_KEY=
VAR7_VALUE=
VAR8_KEY=
VAR8_VALUE=
VAR9_KEY=
VAR9_VALUE=
VAR10_KEY=
VAR10_VALUE=

